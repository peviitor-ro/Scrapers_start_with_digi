
# This workflow installs Python dependencies, installs OpenCode,
# runs all scrapers, and pushes any resulting file changes.

name: General point run Scrapers

on:
  schedule:
    - cron: '00 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event.repository.fork == false }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt

      - name: Install OpenCode
        run: npm install -g opencode-ai@latest

      - name: Verify OpenCode installation
        run: opencode --version

      - name: Run all scrapers
        env:
          EMAIL: ${{ secrets.EMAIL }}
        run: |
          python3 sites/__main_RunnerFile.py

      - name: Commit and push changes if needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update scraper outputs"
          git push
